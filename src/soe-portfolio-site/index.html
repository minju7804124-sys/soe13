<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoE! Portfolio</title>
  <meta name="description" content="SoE! portfolio website recreation based on uploaded portfolio PDF." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#home">SoE!</a>
      <nav class="nav">
        <a href="#home">HOME</a>
        <a href="#about">ABOUT</a>
        <a href="#film">FILM</a>
        <a href="#animation">ANIMATION</a>
        <a href="#commercial">COMMERCIAL</a>
        <a href="#works">WORKS</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="home" class="section hero">
      <div class="frame"><img src="assets/page_01.png" alt="SoE! home portfolio page" /></div>
    </section>

    <section id="about" class="section">
      <div class="frame"><img src="assets/page_02.png" alt="About page" /></div>
    </section>

    <section id="film" class="section">
      <div class="frame"><img src="assets/page_03.png" alt="Film page" /></div>
    </section>

    <section id="animation" class="section split-gallery">
      <div class="frame"><img src="assets/page_04.png" alt="Animation page INSOMNIA" /></div>
      <div class="frame"><img src="assets/page_05.png" alt="Animation page THE LAST STRING" /></div>
    </section>

    <section id="commercial" class="section split-gallery">
      <div class="frame"><img src="assets/page_06.png" alt="Commercial page High Noon Coke" /></div>
      <div class="frame"><img src="assets/page_07.png" alt="Commercial page Valune" /></div>
      <div class="frame"><img src="assets/page_08.png" alt="Commercial page Etoile" /></div>
    </section>

    <section id="works" class="section split-gallery">
      <div class="frame"><img src="assets/page_09.png" alt="Works page Forbidden Forest" /></div>
      <div class="frame"><img src="assets/page_10.png" alt="Works collage page pink fashion" /></div>
      <div class="frame"><img src="assets/page_11.png" alt="Works collage page surreal landscape" /></div>
      <div class="frame"><img src="assets/page_12.png" alt="Works page SoE monitor collage" /></div>
    </section>

    <section id="contact" class="section split-gallery">
      <div class="frame"><img src="assets/page_13.png" alt="Direction statement page" /></div>
      <div class="frame"><img src="assets/page_14.png" alt="Contact page" /></div>
    </section>
  </main>

  <button class="back-to-top" aria-label="Back to top">↑</button>

  <script src="script.js"></script>
</body>
</html>
